<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph мета-теги -->
    <meta property="og:title" content="Разведение плодовых деревьев для новичков">
    <meta property="og:description" content="Узнайте, как вырастить яблоню, грушу, вишню и другие плодовые деревья. Пошаговые советы для начинающих садоводов.">
    <meta property="og:image" content="https://via.placeholder.com/1200x630/0F1A12/C9A87C?text=Плодовые+деревья">
    <meta property="og:type" content="website">
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Разведение плодовых деревьев для новичков">
    <meta name="twitter:description" content="Узнайте, как вырастить яблоню, грушу, вишню и другие плодовые деревья. Пошаговые советы для начинающих садоводов.">
    <title>Разведение плодовых деревьев для новичков</title>
    <!-- Favicon через SVG с эмодзи -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Шапка сайта -->
    <header class="header">
        <h1 class="header__title">🌳 Разведение плодовых деревьев</h1>
        <p class="header__subtitle">Путеводитель для начинающих садоводов</p>
    </header>

    <!-- Основной контент -->
    <main class="container">
        <div class="cards-grid">
            {% for tree in trees %}
            <article class="card" data-tree-id="{{ tree.id }}">
                <div class="card__icon">{{ tree.emoji }}</div>
                <h2 class="card__title">{{ tree.name }}</h2>
                <p class="card__desc">{{ tree.short_desc }}</p>
                <a href="{{ url_for('article', tree_id=tree.id) }}" class="card__btn">Открыть материал</a>
            </article>
            {% endfor %}
        </div>
    </main>

    <!-- Подвал -->
    <footer class="footer">
        <p>© 2026 Разведение плодовых деревьев для новичков</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
